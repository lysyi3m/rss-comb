url: "https://example.com/feed.xml"

enabled: false

settings:
  refresh_interval: 1800  # 30 minutes
  max_items: 50
  timeout: 30             # seconds (for both feed fetching and content extraction)
  extract_content: true   # Enable content extraction

filters:
  - field: "title"
    includes:
      - "technology"           # Substring match (case-insensitive)
      - "/^programming/"       # Regex: starts with "programming"
    excludes:
      - "advertisement"
      - "spam"
      - "/weekly|digest/"      # Regex: matches either "weekly" OR "digest"

  - field: "description"
    excludes:
      - "click here"
      - "/buy now|order today/" # Regex: common sales phrases
