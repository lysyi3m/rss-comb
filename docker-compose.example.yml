services:
  app:
    image: ghcr.io/lysyi3m/rss-comb:latest
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      FEEDS_DIR: /app/feeds
      MEDIA_DIR: /app/media
      DB_PATH: /app/data/rss-comb.db
      BASE_URL: ${BASE_URL}
      API_ACCESS_KEY: ${API_ACCESS_KEY}
      TZ: ${TZ:-UTC}
    volumes:
      - ./feeds:/app/feeds:ro
      - media_data:/app/media
      - db_data:/app/data

volumes:
  media_data:
  db_data:
